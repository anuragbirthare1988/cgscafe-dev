<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CGS LIVE MENU MASTER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark-color: #0c0a08;
      --bg-card-color: #12100e;
      --bg-sidebar-color: #161310;
      --accent-gold: #c5a880;
      --text-main: #e6dfd5;
      --text-muted: #8c7b68;
      --text-darker: #524639;
      --border-color: #221d17;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #050403; color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    
    .top-menu-selector-hub { background-color: #1c1814; border-bottom: 2px solid var(--border-color); padding: 15px 30px; position: sticky; top: 0; z-index: 9999; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .brand-logo-txt { font-family: 'Oswald', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--accent-gold); text-transform: uppercase; }
    .nav-toggle-cluster { display: flex; background: #0c0a08; padding: 4px; border-radius: 4px; border: 1px solid var(--border-color); }
    .toggle-view-btn { background: none; border: none; color: var(--text-muted); font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 24px; cursor: pointer; transition: all 0.3s; }
    .toggle-view-btn.active { background-color: var(--accent-gold); color: var(--bg-dark-color); }
    .btn-action { background-color: var(--accent-gold); color: var(--bg-dark-color); border: none; padding: 10px 28px; font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; cursor: pointer; }
    
    .canvas-container { width: 100%; max-width: 1400px; margin: 40px auto; display: flex; flex-direction: column; align-items: center; }
    .a5-landscape-sheet { width: 210mm; height: 148mm; background-color: var(--bg-card-color); border: 1px solid var(--border-color); position: relative; display: flex; flex-direction: row; padding: 14mm 8mm 14mm 0mm; margin-bottom: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.8); overflow: hidden; }
    
    .vertical-sidebar-banner { width: 14mm; background-color: var(--bg-sidebar-color); border-right: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; flex-shrink: 0; height: 100%; }
    .sidebar-text-wrap { display: flex; align-items: baseline; justify-content: center; gap: 12px; transform: rotate(-90deg); white-space: nowrap; max-width: 120mm; }
    .sidebar-main-title { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 500; color: var(--accent-gold); letter-spacing: 6px; text-transform: uppercase; }
    .sidebar-subtitle { font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 400; color: var(--text-darker); letter-spacing: 3.5px; text-transform: uppercase; }
    
    .menu-page-content-pane { flex: 1; height: 120mm; display: flex; flex-direction: column; padding-left: 8mm; position: relative; }
    .concept-wrapper { display: flex; flex-direction: column; justify-content: flex-start; height: 100%; padding-top: 10mm; padding-right: 15mm; padding-left: 5mm; }
    .concept-title { font-family: 'Oswald', sans-serif; font-size: 32px; font-weight: 500; letter-spacing: 6px; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 24px; }
    .concept-body-text { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13.5px; color: #a3988c; line-height: 1.75; font-weight: 400; }
    .concept-body-text p { margin-bottom: 16px; }
    
    .section-horizontal-band { width: 100%; margin-bottom: 34px; display: flex; flex-direction: column; }
    .section-horizontal-band { width: 100%; margin-bottom: 34px; display: flex; flex-direction: column; }
    .section-header-title { margin-bottom: 14px; border-bottom: 1px solid rgba(197, 168, 128, 0.08); padding-bottom: 6px; }
    .section-header-title h3 { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 500; letter-spacing: 3px; color: var(--accent-gold); text-transform: uppercase; }
    .section-header-desc { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 11px; color: #9c8c7a; line-height: 1.45; margin-top: 4px; }
    
    .products-masonry-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px 24px; width: 100%; }
    .product-column-row { display: flex; flex-direction: column; overflow: hidden; }
    .product-title-row { display: flex; align-items: center; margin-bottom: 4px; width: 100%; gap: 6px; }
    .product-title-text { font-family: 'Oswald', sans-serif; font-weight: 500; font-size: 13px; color: var(--text-main); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .star-marker { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 10px; color: var(--accent-gold); flex-shrink: 0; line-height: 1; }
    
    .product-desc-text { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 11px; color: var(--text-muted); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }
    .embedded-metric-group { color: var(--text-muted); font-size: 11px; font-weight: 400; font-family: 'Plus Jakarta Sans', sans-serif; margin-left: 6px; white-space: nowrap; display: inline-block; }
    
    .footer-stamp-line { position: absolute; bottom: 6mm; left: 22mm; right: 8mm; font-family: 'Oswald', sans-serif; font-size: 11px; color: #3b332b; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(197, 168, 128, 0.04); padding-top: 6px; }

    @media print {
      body { background-color: var(--bg-dark-color) !important; color: var(--text-main) !important; }
      .top-menu-selector-hub { display: none !important; }
      .canvas-container { padding: 0 !important; margin: 0 !important; max-width: none !important; }
      .a5-landscape-sheet { width: 210mm !important; height: 148mm !important; page-break-after: always !important; box-shadow: none !important; border: none !important; margin: 0 !important; padding: 14mm 8mm 14mm 0mm !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
    .btn-nav-menu { background: #d4a84b; color: #1c1412; }
    .btn-nav-menu:hover { background: transparent; color: #d2a54b; box-shadow: 0 0 20px hsla(39, 48%, 57%, .35); }
  </style>
</head>
<body>

  <header class="top-menu-selector-hub">
    <div class="brand-logo-txt">CGS LIVE MENU MASTER</div>
    <div class="nav-toggle-cluster">
      <button id="tab-bev" class="toggle-view-btn active" onclick="switchCanvasTab('beverages')">Beverages</button>
      <button id="tab-eat" class="toggle-view-btn" onclick="switchCanvasTab('eatables')">Eatables</button>
    </div>
    <button class="btn-action" onclick="window.print()">Review & Print Menu</button>
    <a href="menu-edit.html" class="btn-action btn-nav-menu">
        ⚙ Manage Menu
    </a>
  </header>

  <main class="canvas-container">
    <div id="print-canvas-render-target">Establishing data canvas synchronization pipeline...</div>
  </main>

  <script>
    let ACTIVE_CANVAS = 'beverages';
    let MASTER_DATABASE = { categories: [] };

    window.addEventListener("load", async () => {
        try {
            const data = await loadMenuFromSupabase();
            MASTER_DATABASE = data;
            generateProductionMenuLayout();
        } catch (err) {
            document.getElementById("print-canvas-render-target").innerText = "Menu Dynamic Synchronization Failed: " + err.message;
            console.error(err);
        }
    });

    function switchCanvasTab(canvasKey) {
      ACTIVE_CANVAS = canvasKey;
      document.getElementById("tab-bev").classList.toggle("active", canvasKey === 'beverages');
      document.getElementById("tab-eat").classList.toggle("active", canvasKey === 'eatables');
      generateProductionMenuLayout();
    }

    function generateProductionMenuLayout() {
      const target = document.getElementById("print-canvas-render-target");
      target.innerHTML = "";
      
      const activeDataSet = (MASTER_DATABASE.categories || []).filter(cat => {
        return cat.originType === ACTIVE_CANVAS;
      });

      if (activeDataSet.length === 0) {
        target.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-muted); font-family: 'Oswald'; letter-spacing: 2px;">NO ITEMS PRESENT IN THIS VIEW SELECTION</div>`;
        return;
      }

      let pageCount = 1;

      const conceptPage = document.createElement("div");
      conceptPage.className = "a5-landscape-sheet";
      conceptPage.innerHTML = `
        <div class="vertical-sidebar-banner">
          <div class="sidebar-text-wrap"><span class="sidebar-main-title">THE PHILOSOPHY</span></div>
        </div>
        <div class="menu-page-content-pane">
          <div class="concept-wrapper">
            <h2 class="concept-title">Our Concept</h2>
            <div class="concept-body-text">
              <p>Welcome to <strong>Coffee, Grill & Shots</strong>—a premium, pure vegetarian sanctuary explicitly engineered to <strong>Jumpstart Your Mood</strong>.</p>
              <p>Every element on our savory canvas, from the gold-crisp edges of our slow-pressed artisanal melts to our rich skillet creations, is precision-paired to anchor your lounge experience.</p>
            </div>
          </div>
        </div>
        <div class="footer-stamp-line"><span></span><span>${pageCount}</span></div>
      `;
      target.appendChild(conceptPage);
      pageCount++;

      const MAXIMUM_PAGE_BUG_HEIGHT = 440; 
      let currentAllocatedHeight = 0;
      let pageFrameElement = null;
      let contentPaneWindow = null;
      let previousSuperCategory = "";

      activeDataSet.forEach(subCatGroup => {
        // Fix: Don't render hidden category sections on the master view layout
        if (subCatGroup.hidden) return;

        const visibleItems = (subCatGroup.items || []).filter(i => !i.hidden);
        if (visibleItems.length === 0) return;

        let costHeaderBlock = 54;
        const columnsHeightTracker = [0, 0, 0];
        
        visibleItems.forEach((item, index) => {
          const textLengthScore = (item.description || "").trim().length + (item.price || "").length + 12;
          const overflowLineMultiplier = Math.max(0, Math.ceil(textLengthScore / 32) - 1);
          columnsHeightTracker[index % 3] += (26 + (overflowLineMultiplier * 18));
        });
        
        const totalCalculatedBlockFootprint = costHeaderBlock + Math.max(...columnsHeightTracker) + 36;
        let targetCategoryChangeBreak = (previousSuperCategory !== "" && previousSuperCategory !== subCatGroup.superCategory);

        if (!pageFrameElement || (currentAllocatedHeight + totalCalculatedBlockFootprint > MAXIMUM_PAGE_BUG_HEIGHT) || targetCategoryChangeBreak) {
          pageFrameElement = buildPageStructuralShell(pageCount, subCatGroup.superCategory, subCatGroup.tag || "");
          contentPaneWindow = pageFrameElement.querySelector(".menu-page-content-pane");
          target.appendChild(pageFrameElement);
          currentAllocatedHeight = 0;
          pageCount++;
        }

        const sectionBandNode = document.createElement("div");
        sectionBandNode.className = "section-horizontal-band";
        sectionBandNode.innerHTML = `
          <div class="section-header-title">
            <h3>${subCatGroup.subCategoryName}</h3>
            ${subCatGroup.subCategoryDesc ? `<div class="section-header-desc">${subCatGroup.subCategoryDesc}</div>` : ""}
          </div>
        `;

        const masonryGrid = document.createElement("div");
        masonryGrid.className = "products-masonry-grid";

        visibleItems.forEach(item => {
          const itemCol = document.createElement("div");
          itemCol.className = "product-column-row";
          const recommendMarker = item.featured ? `<span class="star-marker">✦</span>` : "";
          
          let cleanDescription = (item.description || "").trim();
          if (cleanDescription.endsWith('.')) { cleanDescription = cleanDescription.slice(0, -1); }

          let metricsLine = "";
          if (item.qty && item.qty.trim() !== "") {
            metricsLine += `${item.qty.trim()} · ${item.price}`;
          } else {
            metricsLine += `${item.price}`;
          }

          itemCol.innerHTML = `
            <div class="product-title-row">
              <span class="product-title-text">${item.name}</span>
              ${recommendMarker}
            </div>
            <div class="product-desc-text">
              ${cleanDescription}<span class="embedded-metric-group">${metricsLine}</span>
            </div>
          `;
          masonryGrid.appendChild(itemCol);
        });

        sectionBandNode.appendChild(masonryGrid);
        contentPaneWindow.appendChild(sectionBandNode);
        currentAllocatedHeight += totalCalculatedBlockFootprint;
        previousSuperCategory = subCatGroup.superCategory;
      });
    }

    function buildPageStructuralShell(pageIndex, mainTitleText, tagSubtitleText) {
      const frame = document.createElement("div");
      frame.className = "a5-landscape-sheet";
      
      let formattedSubtitle = "";
      if (tagSubtitleText) {
         formattedSubtitle = `<span class="sidebar-subtitle">(${tagSubtitleText.replace(/^\(|\)$/g, '')})</span>`;
      }

      frame.innerHTML = `
        <div class="vertical-sidebar-banner">
          <div class="sidebar-text-wrap">
            <span class="sidebar-main-title">${mainTitleText}</span>
            ${formattedSubtitle}
          </div>
        </div>
        <div class="menu-page-content-pane"></div>
        <div class="footer-stamp-line">
          <span style="font-family:'Plus Jakarta Sans'; font-size:9.5px; color:#4a3f34; letter-spacing:0.8px;">✦ Recommended</span>
          <span>${pageIndex}</span>
        </div>
      `;
      return frame;
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script src="./supabase-loader.js"></script>
</body>
</html>
