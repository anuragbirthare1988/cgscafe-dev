<!DOCTYPE html>
<html>
   <head>
      <meta charset="utf-8">
      <script> // This scripot is linked with the script written in index.html (under <head> tag)
         /*
         SPA FALLBACK HANDLER FOR GITHUB PAGES

         GitHub Pages is a static host and does not know how to serve
         deep SPA routes like /our-story or /browse-menu.

         When a user or search engine directly visits:
            https://cgscafe.in/our-story

         GitHub Pages looks for:
            /our-story/index.html
         which does not exist, so it returns 404.

         This script captures that 404 request and stores the
         requested path temporarily in sessionStorage, then
         redirects the browser to the homepage.

         The homepage (index.html) will then restore this path
         and allow router.js to load the correct page content.

         Example flow:
            /our-story
               ↓
            404.html executes
               ↓
            store "/our-story"
               ↓
            redirect to "/"
         */
         sessionStorage.redirect = location.pathname + location.search;
         /*
         Redirect to homepage so the SPA router can take control.
         The router will later restore the stored path.
         */
         location.replace("/");
      </script>
   </head>
   <body></body>
</html>
