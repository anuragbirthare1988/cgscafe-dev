<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting…</title>
  <script>
    (function() {
      // Get current hostname and path
      const hostname = window.location.hostname; // e.g., cgscafe.in or dev.cgscafe.in
      const pathname = window.location.pathname;

      // If user is already at root or index.html, no redirect needed
      if (pathname === '/' || pathname === '/index.html') return;

      // Dynamically redirect all unknown paths to index.html
      // Your SPA router can then parse the path and render correctly
      const target = '/' + (pathname.startsWith('/') ? pathname.slice(1) : pathname);

      // Preserve path in history without causing server 404
      window.history.replaceState({}, '', target);

      // Optional: store the original path for SPA routing
      window.__ORIGINAL_PATH__ = pathname;
    })();
  </script>
</head>
<body>
  <h1>Loading…</h1>
  <p>If nothing happens, <a href="/">click here</a>.</p>
</body>
</html>
