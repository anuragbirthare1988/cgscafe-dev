<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CGS Menu Color Palette</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #282220;
            color: #c2b8ae;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #d17533;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            max-width: 800px;
            margin: auto;
            border-collapse: collapse;
            background-color: #1f1a18;
            border-radius: 10px;
            overflow: hidden;
        }

        th,
        td {
            padding: 15px;
            text-align: left;
        }

        th {
            background-color: #3a3230;
            color: #dabba0;
            font-weight: bold;
        }

        tr {
            border-bottom: 1px solid #3a3230;
        }

        tr:last-child {
            border-bottom: none;
        }

        .swatch {
            width: 50px;
            height: 25px;
            border-radius: 5px;
            border: 1px solid #000;
        }

        .copy {
            cursor: pointer;
            color: #dabba0;
            font-size: 14px;
        }

        .copy:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #c2b8ae;
            font-size: 14px;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: linear-gradient(135deg, #1f1a18, #2a2522);
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s ease;
            border-left: 4px solid #4caf50;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            font-weight: 500;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>

    <h1>CGS Menu Color Palette</h1>

    <table>
        <tr>
            <th>Element</th>
            <th>Preview</th>
            <th>Hex Code</th>
            <th>Usage</th>
        </tr>

        <tr>
            <td>Background</td>
            <td>
                <div class="swatch" style="background:#282220;"></div>
            </td>
            <td class="copy" onclick="copyText('#282220')">#282220</td>
            <td>Main background</td>
        </tr>

        <tr>
            <td>Cafe Name</td>
            <td>
                <div class="swatch" style="background:#d17533;"></div>
            </td>
            <td class="copy" onclick="copyText('#d17533')">#d17533</td>
            <td>Logo / Heading</td>
        </tr>

        <tr>
            <td>Heading / Sub-heading</td>
            <td>
                <div class="swatch" style="background:#dabba0;"></div>
            </td>
            <td class="copy" onclick="copyText('#dabba0')">#dabba0</td>
            <td>Category titles</td>
        </tr>

        <tr>
            <td>Menu Items</td>
            <td>
                <div class="swatch" style="background:#c2b8ae;"></div>
            </td>
            <td class="copy" onclick="copyText('#c2b8ae')">#c2b8ae</td>
            <td>Dish names</td>
        </tr>

        <tr>
            <td>Divider</td>
            <td>
                <div class="swatch" style="background:#3a3230;"></div>
            </td>
            <td class="copy" onclick="copyText('#3a3230')">#3a3230</td>
            <td>Lines / separators</td>
        </tr>

    </table>

    <div class="footer">
        Click on any hex code to copy 🎯
    </div>

    <div id="toast" class="toast"></div>

    <script>
        function copyText(text) {
            navigator.clipboard.writeText(text);
            showToast("✔ Copied " + text);
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.classList.add("show");

            setTimeout(() => {
                toast.classList.remove("show");
            }, 2000);
        }
    </script>

</body>

</html>
