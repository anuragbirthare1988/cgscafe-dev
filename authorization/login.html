<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>CGS Administrator Login</title>
      <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
      <script src="../menu/supabase-config.js"></script>
      <style>
         *{
         box-sizing:border-box;
         margin:0;
         padding:0;
         }
         body{
         background:#0f0f0f;
         font-family:'Plus Jakarta Sans',sans-serif;
         display:flex;
         justify-content:center;
         align-items:center;
         height:100vh;
         color:white;
         }
         .login-card{
         width:420px;
         background:#181818;
         border:1px solid rgba(212,175,55,.25);
         border-radius:22px;
         padding:42px;
         box-shadow:0 20px 70px rgba(0,0,0,.45);
         }
         .logo{
         font-family:'Oswald';
         font-size:34px;
         letter-spacing:3px;
         text-align:center;
         color:#D4AF37;
         }
         .subtitle{
         text-align:center;
         margin-top:8px;
         margin-bottom:40px;
         color:#9b9b9b;
         }
         input{
         width:100%;
         padding:14px;
         margin-bottom:18px;
         border-radius:12px;
         border:1px solid #333;
         background:#111;
         color:white;
         font-size:15px;
         }
         button{
         width:100%;
         padding:14px;
         border:none;
         border-radius:12px;
         background:#D4AF37;
         font-family:'Oswald';
         font-size:16px;
         cursor:pointer;
         }
         button:hover{
         background:#e7bf45;
         }
         #error{
         margin-top:18px;
         text-align:center;
         color:#ff7070;
         }
      </style>
   </head>
   <body>
      <div class="login-card">
         <div class="logo">
            CGS
         </div>
         <div class="subtitle">
            Administrator Login
         </div>
         <input
            id="email"
            type="email"
            placeholder="Email">
         <input
            id="password"
            type="password"
            placeholder="Password">
         <button onclick="login()">
         LOGIN
         </button>
         <div id="error"></div>
      </div>
      <script src="auth.js"></script>
   </body>
</html>
