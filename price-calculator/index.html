<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/fonts/google-fonts.css" rel="stylesheet">
    <title>Yield Cost Calculator</title>
    
    <style>
        :root {
            --bg-outer: #f4eae1;       /* Light cream outer background */
            --bg-card: #282220;        /* Deep charcoal/brown card background */
            --text-gold: #dabba0;      /* Muted beige/gold headings */
            --brand-orange: #d17533;   /* Accent orange for live pricing */
            --input-bg: #1e1917;       /* Darker inset input fields */
            --input-border: #3a3230;   /* Subtle divider border */
            --text-muted: #8c827a;     /* Subtitles and units */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-outer);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow: hidden; /* No vertical scrolling on desktop */
        }

        /* Narrowed down content block */
        .calc-container {
            width: 100%;
            max-width: 460px; /* Constrained width for a tight, sleek look */
        }

        .calc-header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .calc-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            color: var(--text-gold);
            font-weight: 400;
        }

        /* Card container holding the stacked row layout */
        .compact-card {
            background-color: var(--bg-card);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* Row 1: Inputs side-by-side */
        .inputs-row {
            display: flex;
            flex-direction: row;
            gap: 1rem;
        }

        .field-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .compact-label {
            color: var(--text-gold);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 500;
        }

        .compact-control {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: #ffffff;
            padding: 0.65rem 0.85rem;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: 'Montserrat', sans-serif;
            transition: border-color 0.2s ease;
        }

        .compact-control:focus {
            outline: none;
            border-color: var(--brand-orange);
        }

        .compact-control::placeholder {
            color: #4a403c;
        }

        /* Row 2: Separated Output Area below the inputs */
        .output-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-top: 1px solid var(--input-border);
            padding-top: 1rem;
            text-align: center;
        }

        .output-label {
            color: var(--text-muted);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.1rem;
        }

        .output-price {
            font-size: 2.4rem;
            font-weight: 600;
            color: var(--brand-orange);
            white-space: nowrap;
        }

        .output-unit {
            font-size: 1rem;
            color: #ffffff;
            font-weight: 300;
        }

        /* Safe fallback for exceptionally narrow mobile screens */
        @media (max-width: 380px) {
            .inputs-row {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="calc-container">
        <div class="calc-header">
            <h1 class="calc-title">Yield Cost Calculator</h1>
        </div>

        <div class="compact-card">
            
            <!-- ROW 1: Side-by-Side Input Fields -->
            <div class="inputs-row">
                <!-- Price Input -->
                <div class="field-group">
                    <label class="compact-label">Pack Price (₹)</label>
                    <input type="number" step="0.01" id="packPrice" class="compact-control" placeholder="e.g. 450" oninput="runLiveCalc()">
                </div>

                <!-- Size Input -->
                <div class="field-group">
                    <label class="compact-label">Pack Size (kg / L)</label>
                    <input type="number" step="0.001" id="packYield" class="compact-control" placeholder="e.g. 0.5" oninput="runLiveCalc()">
                </div>
            </div>

            <!-- ROW 2: Focused Output Summary below -->
            <div class="output-row">
                <div class="output-label">Calculated Rate</div>
                <div class="output-price">
                    ₹<span id="rateOutput">0.00</span><span class="output-unit"> /kg or L</span>
                </div>
            </div>

        </div>
    </div>

    <!-- Live Math Calculation Logic -->
    <script>
        function runLiveCalc() {
            const rawPrice = document.getElementById('packPrice').value;
            const rawSize = document.getElementById('packYield').value;
            const targetDisplay = document.getElementById('rateOutput');

            const validatedPrice = parseFloat(rawPrice);
            const validatedSize = parseFloat(rawSize);

            if (isNaN(validatedPrice) || isNaN(validatedSize) || validatedSize <= 0) {
                targetDisplay.innerText = "0.00";
                return;
            }

            const calculationResult = validatedPrice / validatedSize;

            targetDisplay.innerText = calculationResult.toLocaleString('en-IN', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
    </script>

</body>
</html>
